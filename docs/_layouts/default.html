<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/images/anametric-logo.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <img src="{{ '/images/Ana_color_horiz_V2.svg' | relative_url }}" alt="Anametric" class="nav-logo-wide">
        <span class="nav-divider">×</span>
        <img src="{{ '/images/steer-blue-logo.png' | relative_url }}" alt="STEER" class="nav-logo-steer">
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/STEER_User_Guide' | relative_url }}">CLI Guide</a>
        <a href="{{ '/STEER_GUI_User_Guide' | relative_url }}">GUI Guide</a>
        <a href="{{ '/STEER_Developer_Guide' | relative_url }}">Developer Guide</a>

  <main class="page-content">
    {{ content }}

  <footer class="site-footer">

      <div class="footer-logos">
        <img src="{{ '/images/Ana_color_horiz_V2.svg' | relative_url }}" alt="Anametric" height="32">
        <img src="{{ '/images/steer-blue-logo.png' | relative_url }}" alt="STEER" height="28">
