<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/images/anametric-logo.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">
        <img src="{{ '/images/Ana_color_horiz_V2.svg' | relative_url }}" alt="Anametric" class="nav-logo-wide">
        <span class="nav-divider">×</span>
        <img src="{{ '/images/steer-blue-logo.png' | relative_url }}" alt="STEER" class="nav-logo-steer">
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/STEER_User_Guide' | relative_url }}">CLI Guide</a>
        <a href="{{ '/STEER_GUI_User_Guide' | relative_url }}">GUI Guide</a>
        <a href="{{ '/STEER_Developer_Guide' | relative_url }}">Developer Guide</a>
        <a href="https://github.com/mathornton01/steer-framework" target="_blank">GitHub ↗</a>
      </div>
    </div>
  </nav>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logos">
        <img src="{{ '/images/Ana_color_horiz_V2.svg' | relative_url }}" alt="Anametric">
        <img src="{{ '/images/steer-blue-logo.png' | relative_url }}" alt="STEER">
      </div>
      <p class="footer-text">Anametric STEER &middot; Statistical Testing of Entropy Evaluation Report</p>
      <p class="footer-links">
        <a href="https://github.com/mathornton01/steer-framework">GitHub</a> &middot;
        <a href="https://github.com/mathornton01/steer-framework/issues">Issues</a> &middot;
        MIT License
      </p>
    </div>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.carousel-wrapper').forEach(function (wrapper) {
      var track = wrapper.querySelector('.carousel-track');
      var slides = wrapper.querySelectorAll('.carousel-slide');
      var dots = wrapper.querySelectorAll('.carousel-dot');
      var prevBtn = wrapper.querySelector('.carousel-arrow.prev');
      var nextBtn = wrapper.querySelector('.carousel-arrow.next');
      var current = 0;
      var count = slides.length;
      if (!track || count === 0) return;

      function goTo(idx) {
        current = ((idx % count) + count) % count;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach(function (d, i) {
          d.classList.toggle('active', i === current);
        });
        /* Update reflection */
        var reflections = wrapper.querySelectorAll('.carousel-reflection');
        reflections.forEach(function (r, i) {
          r.style.display = i === current ? 'block' : 'none';
        });
        /* Update caption */
        var captions = wrapper.querySelectorAll('.carousel-caption');
        captions.forEach(function (c, i) {
          c.style.display = i === current ? 'block' : 'none';
        });
      }

      if (prevBtn) prevBtn.addEventListener('click', function () { goTo(current - 1); });
      if (nextBtn) nextBtn.addEventListener('click', function () { goTo(current + 1); });
      dots.forEach(function (dot, i) {
        dot.addEventListener('click', function () { goTo(i); });
      });

      /* Touch/swipe support */
      var startX = 0;
      var dragging = false;
      track.addEventListener('touchstart', function (e) {
        startX = e.touches[0].clientX;
        dragging = true;
      }, { passive: true });
      track.addEventListener('touchend', function (e) {
        if (!dragging) return;
        dragging = false;
        var diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) {
          goTo(diff > 0 ? current + 1 : current - 1);
        }
      }, { passive: true });

      /* Keyboard navigation */
      wrapper.setAttribute('tabindex', '0');
      wrapper.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft') goTo(current - 1);
        else if (e.key === 'ArrowRight') goTo(current + 1);
      });

      goTo(0);
    });
  });
  </script>
</body>
</html>
